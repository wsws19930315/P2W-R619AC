name: Build R619AC-IMM-Master-IM

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'Debugging with tmate'
        required: false
        default: 'false'

permissions:
  contents: write
  actions: read

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: R619AC-25.12.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  AUTO_RELEASE_PREFIX: R619AC-IMM-Master-
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          for file in "$CONFIG_FILE" "$DIY_P1_SH" "$DIY_P2_SH"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc

          sudo -E apt-get -qq update

          sudo -E apt-get -qq install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            python3-distutils \
            python3-pip \
            python3-ply \
            python3-setuptools \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget \
            curl \
            swig \
            time \
            xsltproc \
            libelf-dev \
            libglib2.0-dev \
            libgmp3-dev \
            libltdl-dev \
            libmpc-dev \
            libmpfr-dev \
            libreadline-dev \
            libz-dev \
            zstd \
            qemu-utils \
            upx-ucl \
            ccache \
            device-tree-compiler \
            python2

          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          python3 -m pip install --user --upgrade "cmake>=3.31,<3.32"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          sudo ln -sf "$HOME/.local/bin/cmake" /usr/local/bin/cmake
          sudo ln -sf "$HOME/.local/bin/ctest" /usr/local/bin/ctest
          sudo ln -sf "$HOME/.local/bin/cpack" /usr/local/bin/cpack
          export PATH="/usr/local/bin:$HOME/.local/bin:$PATH"
          which cmake
          cmake --version
          sudo timedatectl set-timezone "$TZ"

          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone source code
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load custom feeds
        run: |
          if [ -e "$FEEDS_CONF" ]; then
            mv "$FEEDS_CONF" openwrt/feeds.conf.default
          else
            echo "Optional feeds file not found: $FEEDS_CONF"
            echo "Using upstream default feeds.conf.default"
          fi

          chmod +x "$DIY_P1_SH"
          sed -i -e 's/\r$//' "$GITHUB_WORKSPACE/$DIY_P1_SH"

          cd openwrt
          "$GITHUB_WORKSPACE/$DIY_P1_SH"

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          rm -rf feeds/packages/lang/golang
          git clone https://github.com/sbwml/packages_lang_golang -b 26.x feeds/packages/lang/golang

      - name: Install feeds
        run: |
          cd openwrt
          ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          if [ -e files ]; then
            mv files openwrt/files
          fi

          if [ -e "$CONFIG_FILE" ]; then
            mv "$CONFIG_FILE" openwrt/.config
          fi

          chmod +x "$DIY_P2_SH"
          sed -i -e 's/\r$//' "$GITHUB_WORKSPACE/$DIY_P2_SH"

          cd openwrt
          "$GITHUB_WORKSPACE/$DIY_P2_SH"

      - name: SSH connection to Actions
        uses: P3TERX/ssh2actions@v1.0.0
        if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh != 'false') || contains(github.event.action, 'ssh')
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Download package
        id: package
        run: |
          export PATH="/usr/local/bin:$HOME/.local/bin:$PATH"
          which cmake
          cmake --version

          cd openwrt
          make defconfig
          make download -j$(($(nproc)+1))

          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile the firmware
        id: compile
        run: |
          export PATH="/usr/local/bin:$HOME/.local/bin:$PATH"
          which cmake
          cmake --version

          cd openwrt
          echo "$(nproc) thread compile"

          make -j$(($(nproc)+1)) || make -j4 || make -j1 V=s

          echo "status=success" >> $GITHUB_OUTPUT

          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME

          if [ -s DEVICE_NAME ]; then
            echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          fi

          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: If Error
        if: steps.compile.outcome == 'failure'
        run: |
          export PATH="/usr/local/bin:$HOME/.local/bin:$PATH"

          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            curl "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=Firmware compile failed."
          fi

          cat openwrt/.config
          echo '================================================================'

          cd openwrt
          make -j1 V=s

      - name: Check space usage
        if: always()
        run: df -hT

      - name: Upload bin directory
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin

      - name: Organize files
        id: organize
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages

          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware directory
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: IMM-Master-${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Generate release tag
        id: tag
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          cat > release.txt <<'EOF'
          ## R619AC ImmortalWrt Master 最新固件

          :clock3: **构建时间**: BUILD_TIME
          :rocket: **发布方式**: 手动触发或 repository_dispatch

          ### :red_envelope: 固件说明及默认配置

          - **后台地址**: 192.168.88.1
          - **管理账号**: root
          - **管理密码**: 无密码，初次登录直接进入
          - **Wi-Fi 名称**: ImmortalWrt 或 OpenWrt
          - **Wi-Fi 密码**: 默认无密码
          - **底层源码**: 基于 [ImmortalWrt Master 分支](https://github.com/immortalwrt/immortalwrt)
          EOF
          sed -i "s/BUILD_TIME/$(date +"%Y-%m-%d %H:%M:%S")/" release.txt

          echo "release_tag=R619AC-IMM-Master-$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v2
        if: steps.organize.outputs.status == 'success' && steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: Remove old auto releases
        uses: actions/github-script@v7
        if: steps.organize.outputs.status == 'success' && steps.tag.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prefix = process.env.AUTO_RELEASE_PREFIX;
            const keepLatest = 6;
            const { owner, repo } = context.repo;

            const releases = await github.paginate(
              github.rest.repos.listReleases,
              { owner, repo, per_page: 100 }
            );

            const autoReleases = releases
              .filter(release => release.tag_name && release.tag_name.startsWith(prefix))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const releasesToDelete = autoReleases.slice(keepLatest);

            core.info(`Found ${autoReleases.length} auto releases with prefix ${prefix}`);
            core.info(`Deleting ${releasesToDelete.length} old auto releases`);

            for (const release of releasesToDelete) {
              core.info(`Deleting release ${release.tag_name} (${release.id})`);
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `tags/${release.tag_name}`,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                core.info(`Tag already missing: ${release.tag_name}`);
              }
            }
